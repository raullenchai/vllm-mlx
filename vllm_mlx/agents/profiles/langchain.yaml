name: langchain
display_name: "LangChain"
repo: "langchain-ai/langchain"
stars: 100000

config:
  type: env
  env_vars:
    OPENAI_BASE_URL: "{base_url}"
    OPENAI_API_KEY: "not-needed"

models:
  recommended:
    - "qwen3.5-9b"
    - "qwen3.5-4b"

streaming:
  max_tools: 10

testing:
  install_cmd: "pip install langchain-openai"
  specific_tests: "test_langchain.py"

capabilities:
  function_calling: true
  streaming: true
  vision: false
  reasoning: false

known_issues:
  - "with_structured_output() overrides max_tokens to None; thinking models burn budget"
