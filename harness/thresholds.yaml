# Doctor regression thresholds.
#
# Each metric lists:
#   regression_pct  — drop > this % triggers a Status.REGRESSION
#   improvement_pct — gain > this % suggests --update-baselines
#
# We err on the strict side: catching a 5% perf regression early is
# cheaper than chasing a 20% one after several merges have piled up.
# Adjust per-metric, not globally — different signals tolerate different
# noise levels.

# Performance.  Metric names match the keys emitted by
# scripts/autoresearch_bench.py --json (see ``run_suite()`` there).
decode_tps:
  regression_pct: 5
  improvement_pct: 10
cold_tps:
  regression_pct: 5
  improvement_pct: 10
mt_tps:
  regression_pct: 5
  improvement_pct: 10
long_tps:
  regression_pct: 5
  improvement_pct: 10
cold_ttft_ms:
  regression_pct: 10        # higher noise floor; cold startup is variable
  improvement_pct: 15
cached_ttft_ms:
  regression_pct: 10
  improvement_pct: 15
mt_ttft_ms:
  regression_pct: 10
  improvement_pct: 15
long_ttft_ms:
  regression_pct: 10
  improvement_pct: 15
long_cached_ttft_ms:
  regression_pct: 10
  improvement_pct: 15
tc_latency_ms:
  regression_pct: 10
  improvement_pct: 15
peak_ram_mb:
  regression_pct: 10        # memory growth is treated as a regression
  improvement_pct: 10
composite_score:
  regression_pct: 5
  improvement_pct: 10

# Functional / accuracy — zero tolerance: any drop is a regression
tc_success_rate:
  regression_pct: 0
  improvement_pct: 5
tool_call_accuracy:
  regression_pct: 0
  improvement_pct: 5
reasoning_accuracy:
  regression_pct: 0
  improvement_pct: 5
coding_accuracy:
  regression_pct: 0
  improvement_pct: 5
